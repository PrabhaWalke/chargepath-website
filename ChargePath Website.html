document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

bkit-scrollbar{width:10px}\n  ::-webkit-scrollbar-track{background:#051625}\n  ::-webkit-scrollbar-thumb{background:#143049;border-radius:6px}\n  @keyframes cpPulse{0%,100%{opacity:.45}50%{opacity:1}}\n  @keyframes cpRing{0%{transform:scale(.55);opacity:.55}70%{opacity:0}100%{transform:scale(1.5);opacity:0}}\n  @keyframes cpFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}\n  @keyframes cpArc{0%{opacity:0;stroke-dashoffset:60}30%{opacity:.9}100%{opacity:0;stroke-dashoffset:0}}\n  @keyframes cpDrive{0%{transform:translateX(-120px)}100%{transform:translateX(1080px)}}\n  @keyframes cpDash{to{stroke-dashoffset:-200}}\n  @keyframes cpFill{0%{width:18%}50%{width:92%}100%{width:18%}}\n  @keyframes cpGlow{0%,100%{filter:drop-shadow(0 0 6px rgba(25,201,168,.35))}50%{filter:drop-shadow(0 0 18px rgba(25,201,168,.7))}}\n  [data-motion=\"off\"] .cp-anim{animation:none!important}\n  [data-motion=\"off\"] .cp-anim *{animation:none!important}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div ref=\"{{ rootRef }}\" data-motion=\"{{ motionAttr }}\" style=\"position:relative;width:100%;min-height:100vh;background:radial-gradient(1200px 620px at 50% -8%, rgba(25,201,168,.14), transparent 60%), radial-gradient(900px 520px at 88% 8%, rgba(62,139,240,.12), transparent 55%), #051625;overflow:hidden\">\n\n  <!-- ============ NAV ============ -->\n  <nav ref=\"{{ navRef }}\" style=\"position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:16px clamp(20px,5vw,56px);transition:background .3s ease, border-color .3s ease, backdrop-filter .3s ease;border-bottom:1px solid transparent\">\n    <a href=\"#top\" style=\"display:flex;align-items:center;gap:14px\">\n      <div style=\"box-sizing: border-box; display: flex; flex-direction: column; gap: 12px; flex-wrap: wrap\"><img src=\"216ba71f-e907-499b-95ae-6e899857ba83\" alt=\"ChargePath\" style=\"width: 157px; height: 149px; object-fit: contain; filter: drop-shadow(0 0 14px rgba(25,201,168,.5))\"><\u002Fdiv>\n      \n    <\u002Fa>\n    <div style=\"display:none;align-items:center;gap:26px;font-size:14px;font-weight:500;color:#A9BFD2\" data-navlinks=\"\">\n      <a href=\"#problem\" style=\"transition:color .2s;white-space:nowrap\" onmouseover=\"{{ navHover }}\" onmouseout=\"{{ navOut }}\">Problem<\u002Fa>\n      <a href=\"#solution\" style=\"transition:color .2s;white-space:nowrap\" onmouseover=\"{{ navHover }}\" onmouseout=\"{{ navOut }}\">Solution<\u002Fa>\n      <a href=\"#tech\" style=\"transition:color .2s;white-space:nowrap\" onmouseover=\"{{ navHover }}\" onmouseout=\"{{ navOut }}\">Technology<\u002Fa>\n      <a href=\"#network\" style=\"transition:color .2s;white-space:nowrap\" onmouseover=\"{{ navHover }}\" onmouseout=\"{{ navOut }}\">Network<\u002Fa>\n      <a href=\"#business\" style=\"transition:color .2s;white-space:nowrap\" onmouseover=\"{{ navHover }}\" onmouseout=\"{{ navOut }}\">Business<\u002Fa>\n      <a href=\"#assistant\" style=\"transition:color .2s;white-space:nowrap\" onmouseover=\"{{ navHover }}\" onmouseout=\"{{ navOut }}\">Ask AI<\u002Fa>\n    <\u002Fdiv>\n    <a href=\"#contact\" style=\"display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:999px;background:linear-gradient(100deg,var(--cp-accent,#19C9A8),#3E8BF0);color:#04121f;font-weight:700;font-size:13.5px;letter-spacing:.02em;white-space:nowrap;box-shadow:0 6px 22px rgba(25,201,168,.28)\">Partner with us<\u002Fa>\n  <span style=\"font-family: 'Space Grotesk',sans-serif; font-weight: 600; font-size: 23px; letter-spacing: .22em; color: #EAF4F8; position: absolute; left: 170px; top: 76px\">CHARGEPATH<\u002Fspan><\u002Fnav>\n\n  <!-- ============ HERO ============ -->\n  <header id=\"top\" style=\"position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:140px clamp(20px,5vw,56px) 80px\">\n    <div class=\"cp-anim\" style=\"position:relative;width:clamp(200px,28vw,300px);height:clamp(200px,28vw,300px);display:flex;align-items:center;justify-content:center;margin-bottom:34px\">\n      <span class=\"cp-anim\" style=\"position:absolute;inset:0;border-radius:50%;border:1px solid rgba(25,201,168,.5);animation:cpRing 3.4s ease-out infinite\"><\u002Fspan>\n      <span class=\"cp-anim\" style=\"position:absolute;inset:0;border-radius:50%;border:1px solid rgba(62,139,240,.45);animation:cpRing 3.4s ease-out infinite 1.7s\"><\u002Fspan>\n      <img src=\"216ba71f-e907-499b-95ae-6e899857ba83\" alt=\"ChargePath logo\" class=\"cp-anim\" style=\"position:relative;width:100%;height:100%;object-fit:contain;animation:cpGlow 4s ease-in-out infinite\">\n    <\u002Fdiv>\n    <h1 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(34px,5.4vw,68px);line-height:1.02;letter-spacing:.18em;color:#F2F8FC;margin-bottom:14px\">CHARGEPATH<\u002Fh1>\n    <p style=\"font-family:'Space Mono',monospace;font-size:clamp(12px,1.5vw,16px);letter-spacing:.5em;text-indent:.5em;color:var(--cp-accent,#19C9A8);margin-bottom:40px;text-transform:uppercase\">Power While You Drive<\u002Fp>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:clamp(22px,3.4vw,40px);line-height:1.2;max-width:880px;color:#DCE9F2;margin-bottom:22px;text-wrap:balance\">The vehicle of the future shouldn't have to <span style=\"color:var(--cp-accent,#19C9A8)\">stop to refuel.<\u002Fspan><\u002Fh2>\n    <p style=\"font-size:clamp(15px,1.7vw,19px);line-height:1.6;max-width:620px;color:#95ABC0;margin-bottom:40px;text-wrap:pretty\">ChargePath turns highways into wireless charging networks, so electric vehicles draw power from the road itself, while moving. No stops. No range anxiety.<\u002Fp>\n    <div style=\"display:flex;flex-wrap:wrap;gap:14px;justify-content:center\">\n      <a href=\"#tech\" style=\"display:inline-flex;align-items:center;gap:9px;padding:15px 30px;border-radius:999px;background:linear-gradient(100deg,var(--cp-accent,#19C9A8),#3E8BF0);color:#04121f;font-weight:700;font-size:15px;box-shadow:0 10px 34px rgba(25,201,168,.3)\">See how it works →<\u002Fa>\n      <button data-tally-open=\"A7QNal\" data-tally-emoji-text=\"👋\" data-tally-emoji-animation=\"wave\" style=\"display:inline-flex;align-items:center;gap:9px;padding:15px 30px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid rgba(120,190,220,.28);color:#DCE9F2;font-weight:600;font-size:15px;font-family:'Manrope',sans-serif;cursor:pointer\">Share your feedback<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px\">\n      <span style=\"width:1px;height:40px;background:linear-gradient(rgba(94,118,139,.7),transparent)\"><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ============ PROBLEM ============ -->\n  <section id=\"problem\" style=\"position:relative;max-width:1200px;margin:0 auto;padding:clamp(72px,10vh,120px) clamp(20px,5vw,56px)\">\n    <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:18px\">\n      <span style=\"font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.25em;color:var(--cp-accent,#19C9A8);text-transform:uppercase\">// The barrier<\u002Fspan>\n      <span style=\"flex:1;height:1px;background:linear-gradient(90deg,rgba(25,201,168,.4),transparent)\"><\u002Fspan>\n    <\u002Fdiv>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(28px,4.2vw,50px);line-height:1.08;max-width:880px;margin-bottom:18px;text-wrap:balance\">EV adoption has one major barrier left to solve.<\u002Fh2>\n    <p style=\"font-size:clamp(16px,1.8vw,20px);line-height:1.6;max-width:680px;color:#95ABC0;margin-bottom:52px\">The vehicle of the future still depends on stopping to refuel. Until that changes, the friction stays, and so does the hesitation to go electric.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px\">\n      <div style=\"background:rgba(255,255,255,.025);border:1px solid rgba(120,190,220,.12);border-radius:18px;padding:26px\">\n        <div style=\"font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700;color:var(--cp-accent,#19C9A8);margin-bottom:14px\">01<\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:600;margin-bottom:8px\">Range anxiety<\u002Fh3>\n        <p style=\"font-size:14.5px;line-height:1.55;color:#92A8BD\">The constant worry of running out of charge before the next station limits where and how far drivers will go.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,.025);border:1px solid rgba(120,190,220,.12);border-radius:18px;padding:26px\">\n        <div style=\"font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700;color:var(--cp-accent,#19C9A8);margin-bottom:14px\">02<\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:600;margin-bottom:8px\">Long charging stops<\u002Fh3>\n        <p style=\"font-size:14.5px;line-height:1.55;color:#92A8BD\">Even fast charging takes 20–40 minutes, a hard sell against the two-minute fuel stop drivers are used to.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,.025);border:1px solid rgba(120,190,220,.12);border-radius:18px;padding:26px\">\n        <div style=\"font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700;color:var(--cp-accent,#19C9A8);margin-bottom:14px\">03<\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:600;margin-bottom:8px\">Uneven coverage<\u002Fh3>\n        <p style=\"font-size:14.5px;line-height:1.55;color:#92A8BD\">Charging stations are unevenly distributed, leaving long highway corridors and rural routes underserved.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,.025);border:1px solid rgba(120,190,220,.12);border-radius:18px;padding:26px\">\n        <div style=\"font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:700;color:var(--cp-accent,#19C9A8);margin-bottom:14px\">04<\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:600;margin-bottom:8px\">Fleet downtime<\u002Fh3>\n        <p style=\"font-size:14.5px;line-height:1.55;color:#92A8BD\">Commercial fleets lose billable hours every time a vehicle sits idle at a charger instead of on the road.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SOLUTION ============ -->\n  <section id=\"solution\" style=\"position:relative;background:linear-gradient(180deg,transparent,rgba(8,32,58,.55),transparent);padding:clamp(72px,10vh,120px) 0\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:0 clamp(20px,5vw,56px)\">\n      <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:18px\">\n        <span style=\"font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.25em;color:var(--cp-accent,#19C9A8);text-transform:uppercase\">// The solution<\u002Fspan>\n        <span style=\"flex:1;height:1px;background:linear-gradient(90deg,rgba(25,201,168,.4),transparent)\"><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:48px;align-items:center\">\n        <div>\n          <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(28px,4vw,48px);line-height:1.08;margin-bottom:20px;text-wrap:balance\">We turn the road into the charger.<\u002Fh2>\n          <p style=\"font-size:clamp(15px,1.7vw,18px);line-height:1.65;color:#A0B6CA;margin-bottom:18px;text-wrap:pretty\">Special road panels embed wireless charging coils beneath the surface. As an EV drives over them, energy transfers wirelessly to a receiver pad under the vehicle,&nbsp;<span style=\"color: rgb(220, 233, 242); font-weight: 600;\">power delivered in motion, without ever stopping.<\u002Fspan><\u002Fp>\n          <p style=\"font-size:clamp(15px,1.7vw,18px);line-height:1.65;color:#A0B6CA;text-wrap:pretty\">The longer the journey, the more the road gives back. Highways stop being a constraint and become an always-on energy grid.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:14px\">\n          <div style=\"display:flex;gap:16px;align-items:flex-start;background:rgba(255,255,255,.025);border:1px solid rgba(120,190,220,.12);border-radius:16px;padding:20px 22px\">\n            <span style=\"font-size:22px;flex-shrink:0;filter:grayscale(.1)\">⚡<\u002Fspan>\n            <div><h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:600;margin-bottom:5px\">Zero charging wait<\u002Fh3><p style=\"font-size:14px;line-height:1.5;color:#92A8BD\">Range anxiety and stop times disappear, the battery tops up as you travel.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:16px;align-items:flex-start;background:rgba(255,255,255,.025);border:1px solid rgba(120,190,220,.12);border-radius:16px;padding:20px 22px\">\n            <span style=\"font-size:22px;flex-shrink:0\">🔄<\u002Fspan>\n            <div><h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:600;margin-bottom:5px\">Continuous operation<\u002Fh3><p style=\"font-size:14px;line-height:1.5;color:#92A8BD\">Fleets and transit run with near-zero downtime, vehicles stay on the road, earning.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:16px;align-items:flex-start;background:rgba(255,255,255,.025);border:1px solid rgba(120,190,220,.12);border-radius:16px;padding:20px 22px\">\n            <span style=\"font-size:22px;flex-shrink:0\">🪶<\u002Fspan>\n            <div><h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:600;margin-bottom:5px\">Lighter EV designs<\u002Fh3><p style=\"font-size:14px;line-height:1.5;color:#92A8BD\">Continuous charging means smaller batteries, lighter, cheaper, more efficient vehicles.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:16px;align-items:flex-start;background:rgba(255,255,255,.025);border:1px solid rgba(120,190,220,.12);border-radius:16px;padding:20px 22px\">\n            <span style=\"font-size:22px;flex-shrink:0\">🚀<\u002Fspan>\n            <div><h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:600;margin-bottom:5px\">Faster EV adoption<\u002Fh3><p style=\"font-size:14px;line-height:1.5;color:#92A8BD\">Remove the biggest objection to going electric and the whole transition accelerates.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ HOW IT WORKS / CROSS-SECTION ============ -->\n  <section id=\"tech\" style=\"position:relative;max-width:1200px;margin:0 auto;padding:clamp(72px,10vh,120px) clamp(20px,5vw,56px)\">\n    <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:18px\">\n      <span style=\"font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.25em;color:var(--cp-accent,#19C9A8);text-transform:uppercase\">// How it works<\u002Fspan>\n      <span style=\"flex:1;height:1px;background:linear-gradient(90deg,rgba(25,201,168,.4),transparent)\"><\u002Fspan>\n    <\u002Fdiv>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(28px,4.2vw,50px);line-height:1.08;max-width:820px;margin-bottom:14px;text-wrap:balance\">Inside a ChargePath road.<\u002Fh2>\n    <p style=\"font-size:clamp(16px,1.8vw,19px);line-height:1.6;max-width:680px;color:#95ABC0;margin-bottom:44px\">A cross-section of the smart highway: charging coils sit in a dedicated layer beneath the asphalt, transferring power up through a receiver pad on the vehicle.<\u002Fp>\n    <div style=\"background:rgba(8,26,46,.5);border:1px solid rgba(120,190,220,.12);border-radius:22px;padding:clamp(16px,3vw,34px)\">\n      <svg viewBox=\"0 0 720 470\" role=\"img\" aria-label=\"Cross-section of a ChargePath highway showing an EV receiving wireless power from charging coils embedded beneath the road surface\" style=\"width:100%;height:auto;display:block;font-family:'Manrope',sans-serif\">\n        <!-- ground layers -->\n        <rect x=\"60\" y=\"392\" width=\"600\" height=\"56\" rx=\"3\" fill=\"#0a1a28\" stroke=\"#16324a\" stroke-width=\"1\"><\u002Frect>\n        <text x=\"360\" y=\"425\" text-anchor=\"middle\" fill=\"#6f8499\" font-size=\"13\">Subgrade — compacted soil<\u002Ftext>\n        <rect x=\"60\" y=\"338\" width=\"600\" height=\"54\" rx=\"3\" fill=\"#102a3f\" stroke=\"#1d3a54\" stroke-width=\"1\"><\u002Frect>\n        <text x=\"360\" y=\"370\" text-anchor=\"middle\" fill=\"#9fb6cb\" font-size=\"13\">Aggregate base course<\u002Ftext>\n        <!-- smart layer -->\n        <rect x=\"60\" y=\"276\" width=\"600\" height=\"62\" rx=\"3\" fill=\"rgba(25,201,168,.14)\" stroke=\"#19C9A8\" stroke-width=\"1.4\"><\u002Frect>\n        <rect x=\"60\" y=\"276\" width=\"600\" height=\"62\" rx=\"3\" fill=\"none\" stroke=\"rgba(25,201,168,.6)\" stroke-width=\"1.4\" class=\"cp-anim\" style=\"animation:cpPulse 2.6s ease-in-out infinite\"><\u002Frect>\n        <text x=\"360\" y=\"300\" text-anchor=\"middle\" fill=\"#7cf0d0\" font-size=\"14\" font-weight=\"600\">ChargePath smart layer<\u002Ftext>\n        <text x=\"360\" y=\"318\" text-anchor=\"middle\" fill=\"#5cc7ab\" font-size=\"12\">Embedded wireless charging coils + power-grid connection<\u002Ftext>\n        <!-- coils -->\n        <g class=\"cp-anim\" style=\"animation:cpPulse 2.4s ease-in-out infinite\">\n          <ellipse cx=\"180\" cy=\"330\" rx=\"30\" ry=\"8\" fill=\"none\" stroke=\"#19C9A8\" stroke-width=\"1.4\"><\u002Fellipse><ellipse cx=\"180\" cy=\"325\" rx=\"22\" ry=\"6\" fill=\"none\" stroke=\"#19C9A8\" stroke-width=\"1\"><\u002Fellipse><ellipse cx=\"180\" cy=\"321\" rx=\"14\" ry=\"4\" fill=\"none\" stroke=\"#19C9A8\" stroke-width=\"0.8\"><\u002Fellipse>\n        <\u002Fg>\n        <g class=\"cp-anim\" style=\"animation:cpPulse 2.4s ease-in-out infinite .4s\">\n          <ellipse cx=\"360\" cy=\"330\" rx=\"30\" ry=\"8\" fill=\"none\" stroke=\"#19C9A8\" stroke-width=\"1.4\"><\u002Fellipse><ellipse cx=\"360\" cy=\"325\" rx=\"22\" ry=\"6\" fill=\"none\" stroke=\"#19C9A8\" stroke-width=\"1\"><\u002Fellipse><ellipse cx=\"360\" cy=\"321\" rx=\"14\" ry=\"4\" fill=\"none\" stroke=\"#19C9A8\" stroke-width=\"0.8\"><\u002Fellipse>\n        <\u002Fg>\n        <g class=\"cp-anim\" style=\"animation:cpPulse 2.4s ease-in-out infinite .8s\">\n          <ellipse cx=\"540\" cy=\"330\" rx=\"30\" ry=\"8\" fill=\"none\" stroke=\"#19C9A8\" stroke-width=\"1.4\"><\u002Fellipse><ellipse cx=\"540\" cy=\"325\" rx=\"22\" ry=\"6\" fill=\"none\" stroke=\"#19C9A8\" stroke-width=\"1\"><\u002Fellipse><ellipse cx=\"540\" cy=\"321\" rx=\"14\" ry=\"4\" fill=\"none\" stroke=\"#19C9A8\" stroke-width=\"0.8\"><\u002Fellipse>\n        <\u002Fg>\n        <!-- asphalt -->\n        <rect x=\"60\" y=\"246\" width=\"600\" height=\"30\" rx=\"2\" fill=\"#1a2733\" stroke=\"#2a3a48\" stroke-width=\"1\"><\u002Frect>\n        <text x=\"360\" y=\"266\" text-anchor=\"middle\" fill=\"#c4d3e0\" font-size=\"12\">Asphalt surface layer<\u002Ftext>\n        <line x1=\"316\" y1=\"251\" x2=\"360\" y2=\"251\" stroke=\"#f1efe8\" stroke-width=\"2\" opacity=\".5\"><\u002Fline><line x1=\"372\" y1=\"251\" x2=\"404\" y2=\"251\" stroke=\"#f1efe8\" stroke-width=\"2\" opacity=\".5\"><\u002Fline>\n        <!-- energy arcs -->\n        <path d=\"M300 244 Q360 220 420 244\" fill=\"none\" stroke=\"#19C9A8\" stroke-width=\"1.6\" stroke-dasharray=\"60\" class=\"cp-anim\" style=\"animation:cpArc 1.8s ease-out infinite\"><\u002Fpath>\n        <path d=\"M290 244 Q360 208 430 244\" fill=\"none\" stroke=\"#3E8BF0\" stroke-width=\"1.4\" stroke-dasharray=\"60\" class=\"cp-anim\" style=\"animation:cpArc 1.8s ease-out infinite .35s\"><\u002Fpath>\n        <path d=\"M280 244 Q360 196 440 244\" fill=\"none\" stroke=\"#5DCA8A\" stroke-width=\"1.2\" stroke-dasharray=\"60\" class=\"cp-anim\" style=\"animation:cpArc 1.8s ease-out infinite .7s\"><\u002Fpath>\n        <!-- EV -->\n        <rect x=\"240\" y=\"150\" width=\"240\" height=\"70\" rx=\"16\" fill=\"#0c2742\" stroke=\"#3E8BF0\" stroke-width=\"1.4\"><\u002Frect>\n        <path d=\"M278 150 Q296 120 360 118 Q406 117 430 150 Z\" fill=\"#11385e\" stroke=\"#3E8BF0\" stroke-width=\"1.2\"><\u002Fpath>\n        <path d=\"M292 150 Q306 132 360 130 Q396 129 410 150 Z\" fill=\"#1b4f7f\" opacity=\".7\"><\u002Fpath>\n        <circle cx=\"284\" cy=\"220\" r=\"20\" fill=\"#0a1722\" stroke=\"#2a3a48\" stroke-width=\"1.4\"><\u002Fcircle><circle cx=\"284\" cy=\"220\" r=\"9\" fill=\"#33485c\"><\u002Fcircle>\n        <circle cx=\"436\" cy=\"220\" r=\"20\" fill=\"#0a1722\" stroke=\"#2a3a48\" stroke-width=\"1.4\"><\u002Fcircle><circle cx=\"436\" cy=\"220\" r=\"9\" fill=\"#33485c\"><\u002Fcircle>\n        <!-- receiver pad -->\n        <rect x=\"312\" y=\"216\" width=\"96\" height=\"11\" rx=\"4\" fill=\"#3E8BF0\" stroke=\"#7fb4f4\" stroke-width=\"0.8\"><\u002Frect>\n        <text x=\"360\" y=\"241\" text-anchor=\"middle\" fill=\"#9cc4f4\" font-size=\"11.5\">Receiver pad<\u002Ftext>\n        <!-- charge badge -->\n        <rect x=\"430\" y=\"158\" width=\"44\" height=\"20\" rx=\"6\" fill=\"rgba(25,201,168,.18)\" stroke=\"#19C9A8\" stroke-width=\"1\"><\u002Frect>\n        <text x=\"452\" y=\"172\" text-anchor=\"middle\" fill=\"#7cf0d0\" font-size=\"12\" font-weight=\"700\">75%<\u002Ftext>\n        <!-- labels -->\n        <line x1=\"480\" y1=\"172\" x2=\"560\" y2=\"150\" stroke=\"#456079\" stroke-width=\"1\" stroke-dasharray=\"3 3\"><\u002Fline>\n        <text x=\"566\" y=\"148\" fill=\"#c4d3e0\" font-size=\"12.5\">Electric vehicle<\u002Ftext>\n        <text x=\"566\" y=\"164\" fill=\"#7d93a8\" font-size=\"12\">with receiver pad<\u002Ftext>\n        <line x1=\"442\" y1=\"232\" x2=\"560\" y2=\"244\" stroke=\"#19C9A8\" stroke-width=\"1\" stroke-dasharray=\"3 3\"><\u002Fline>\n        <text x=\"566\" y=\"242\" fill=\"#7cf0d0\" font-size=\"12.5\">Wireless energy transfer<\u002Ftext>\n        <text x=\"566\" y=\"258\" fill=\"#5cc7ab\" font-size=\"12\">resonant inductive coupling<\u002Ftext>\n        <!-- power grid -->\n        <line x1=\"100\" y1=\"438\" x2=\"100\" y2=\"338\" stroke=\"#F0B43C\" stroke-width=\"1.6\" stroke-dasharray=\"5 4\" marker-end=\"url(#cpArrow)\"><\u002Fline>\n        <text x=\"116\" y=\"420\" fill=\"#f0b43c\" font-size=\"12.5\" font-weight=\"600\">Power grid<\u002Ftext>\n        <text x=\"116\" y=\"436\" fill=\"#f0b43c\" font-size=\"12\">input ↑<\u002Ftext>\n        <defs><marker id=\"cpArrow\" viewBox=\"0 0 10 10\" refX=\"8\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto-start-reverse\"><path d=\"M2 1 L8 5 L2 9\" fill=\"none\" stroke=\"#F0B43C\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fmarker><\u002Fdefs>\n        <!-- lane width -->\n        <line x1=\"60\" y1=\"462\" x2=\"660\" y2=\"462\" stroke=\"#456079\" stroke-width=\"1\"><\u002Fline>\n        <line x1=\"60\" y1=\"457\" x2=\"60\" y2=\"467\" stroke=\"#456079\" stroke-width=\"1\"><\u002Fline><line x1=\"660\" y1=\"457\" x2=\"660\" y2=\"467\" stroke=\"#456079\" stroke-width=\"1\"><\u002Fline>\n      <\u002Fsvg>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-wrap:wrap;gap:10px 28px;margin-top:22px;font-size:13px;color:#7d93a8;font-family:'Space Mono',monospace\">\n      <span style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:11px;height:11px;border-radius:3px;background:#19C9A8\"><\u002Fspan>Smart charging layer<\u002Fspan>\n      <span style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:11px;height:11px;border-radius:3px;background:#3E8BF0\"><\u002Fspan>Receiver pad<\u002Fspan>\n      <span style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:11px;height:11px;border-radius:3px;background:#F0B43C\"><\u002Fspan>Grid input<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ NETWORK / TOP-DOWN ============ -->\n  <section id=\"network\" style=\"position:relative;background:linear-gradient(180deg,transparent,rgba(8,32,58,.55),transparent);padding:clamp(72px,10vh,120px) 0;overflow:hidden\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:0 clamp(20px,5vw,56px)\">\n      <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:18px\">\n        <span style=\"font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.25em;color:var(--cp-accent,#19C9A8);text-transform:uppercase\">// The network<\u002Fspan>\n        <span style=\"flex:1;height:1px;background:linear-gradient(90deg,rgba(25,201,168,.4),transparent)\"><\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(28px,4.2vw,50px);line-height:1.08;max-width:820px;margin-bottom:14px;text-wrap:balance\">A charging lane on every highway.<\u002Fh2>\n      <p style=\"font-size:clamp(16px,1.8vw,19px);line-height:1.6;max-width:700px;color:#95ABC0;margin-bottom:40px\">Dedicated lanes fitted with ChargePath panels let EVs charge continuously while regular traffic flows alongside. Top-down view of an active corridor.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"max-width:1280px;margin:0 auto;padding:0 clamp(12px,3vw,40px)\">\n      <div style=\"background:rgba(8,26,46,.5);border:1px solid rgba(120,190,220,.12);border-radius:22px;padding:clamp(14px,2.5vw,26px);overflow:hidden\">\n        <svg viewBox=\"0 0 1000 300\" role=\"img\" aria-label=\"Top-down view of a three-lane highway with the center lane fitted with glowing ChargePath charging panels and EVs charging while driving\" style=\"width:100%;height:auto;display:block;font-family:'Manrope',sans-serif\">\n          <rect x=\"0\" y=\"40\" width=\"1000\" height=\"220\" rx=\"6\" fill=\"#0c1c29\"><\u002Frect>\n          <line x1=\"0\" y1=\"113\" x2=\"1000\" y2=\"113\" stroke=\"#3a4f63\" stroke-width=\"2\" stroke-dasharray=\"22 14\" class=\"cp-anim\" style=\"animation:cpDash 6s linear infinite\"><\u002Fline>\n          <line x1=\"0\" y1=\"187\" x2=\"1000\" y2=\"187\" stroke=\"#3a4f63\" stroke-width=\"2\" stroke-dasharray=\"22 14\" class=\"cp-anim\" style=\"animation:cpDash 6s linear infinite\"><\u002Fline>\n          <!-- charge panels center lane -->\n          <g class=\"cp-anim\" style=\"animation:cpPulse 2.2s ease-in-out infinite\">\n            <rect x=\"60\" y=\"124\" width=\"110\" height=\"52\" rx=\"6\" fill=\"rgba(25,201,168,.16)\" stroke=\"#19C9A8\" stroke-width=\"1.2\"><\u002Frect>\n            <rect x=\"250\" y=\"124\" width=\"110\" height=\"52\" rx=\"6\" fill=\"rgba(25,201,168,.16)\" stroke=\"#19C9A8\" stroke-width=\"1.2\"><\u002Frect>\n            <rect x=\"440\" y=\"124\" width=\"110\" height=\"52\" rx=\"6\" fill=\"rgba(25,201,168,.16)\" stroke=\"#19C9A8\" stroke-width=\"1.2\"><\u002Frect>\n            <rect x=\"630\" y=\"124\" width=\"110\" height=\"52\" rx=\"6\" fill=\"rgba(25,201,168,.16)\" stroke=\"#19C9A8\" stroke-width=\"1.2\"><\u002Frect>\n            <rect x=\"820\" y=\"124\" width=\"110\" height=\"52\" rx=\"6\" fill=\"rgba(25,201,168,.16)\" stroke=\"#19C9A8\" stroke-width=\"1.2\"><\u002Frect>\n          <\u002Fg>\n          <!-- regular cars outer lanes -->\n          <g fill=\"#243748\" stroke=\"#3a4f63\" stroke-width=\"1\">\n            <rect x=\"180\" y=\"60\" width=\"64\" height=\"32\" rx=\"7\"><\u002Frect><rect x=\"520\" y=\"64\" width=\"64\" height=\"32\" rx=\"7\"><\u002Frect><rect x=\"760\" y=\"58\" width=\"64\" height=\"32\" rx=\"7\"><\u002Frect>\n            <rect x=\"120\" y=\"208\" width=\"64\" height=\"32\" rx=\"7\"><\u002Frect><rect x=\"600\" y=\"210\" width=\"64\" height=\"32\" rx=\"7\"><\u002Frect>\n          <\u002Fg>\n          <!-- charging EVs center lane -->\n          <g>\n            <rect x=\"70\" y=\"134\" width=\"70\" height=\"32\" rx=\"8\" fill=\"#0c2742\" stroke=\"#3E8BF0\" stroke-width=\"1.4\"><\u002Frect>\n            <rect x=\"460\" y=\"134\" width=\"70\" height=\"32\" rx=\"8\" fill=\"#0c2742\" stroke=\"#3E8BF0\" stroke-width=\"1.4\"><\u002Frect>\n            <rect x=\"650\" y=\"134\" width=\"70\" height=\"32\" rx=\"8\" fill=\"#0c2742\" stroke=\"#3E8BF0\" stroke-width=\"1.4\"><\u002Frect>\n          <\u002Fg>\n          <!-- moving EV -->\n          <g class=\"cp-anim\" style=\"animation:cpDrive 7s linear infinite\">\n            <rect x=\"0\" y=\"134\" width=\"70\" height=\"32\" rx=\"8\" fill=\"#0c2742\" stroke=\"#19C9A8\" stroke-width=\"1.6\"><\u002Frect>\n            <rect x=\"52\" y=\"138\" width=\"14\" height=\"8\" rx=\"2\" fill=\"#19C9A8\"><\u002Frect>\n          <\u002Fg>\n          <!-- direction -->\n          <line x1=\"40\" y1=\"22\" x2=\"960\" y2=\"22\" stroke=\"#456079\" stroke-width=\"1.4\" marker-end=\"url(#cpArrow2)\"><\u002Fline>\n          <text x=\"500\" y=\"16\" text-anchor=\"middle\" fill=\"#6f8499\" font-size=\"13\" font-family=\"'Space Mono',monospace\" letter-spacing=\"3\">DIRECTION OF TRAVEL<\u002Ftext>\n          <defs><marker id=\"cpArrow2\" viewBox=\"0 0 10 10\" refX=\"8\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto-start-reverse\"><path d=\"M2 1 L8 5 L2 9\" fill=\"none\" stroke=\"#456079\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fmarker><\u002Fdefs>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1200px;margin:30px auto 0;padding:0 clamp(20px,5vw,56px);display:flex;flex-wrap:wrap;gap:10px 28px;font-size:13px;color:#7d93a8;font-family:'Space Mono',monospace\">\n      <span style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:13px;height:13px;border-radius:3px;background:rgba(25,201,168,.4);border:1px solid #19C9A8\"><\u002Fspan>Charging panel — active<\u002Fspan>\n      <span style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:13px;height:13px;border-radius:3px;background:#0c2742;border:1px solid #3E8BF0\"><\u002Fspan>EV receiving charge<\u002Fspan>\n      <span style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:13px;height:13px;border-radius:3px;background:#243748;border:1px solid #3a4f63\"><\u002Fspan>Regular vehicle<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ BUSINESS MODEL ============ -->\n  <section id=\"business\" style=\"position:relative;max-width:1200px;margin:0 auto;padding:clamp(72px,10vh,120px) clamp(20px,5vw,56px)\">\n    <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:18px\">\n      <span style=\"font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.25em;color:var(--cp-accent,#19C9A8);text-transform:uppercase\">// Business model<\u002Fspan>\n      <span style=\"flex:1;height:1px;background:linear-gradient(90deg,rgba(25,201,168,.4),transparent)\"><\u002Fspan>\n    <\u002Fdiv>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(28px,4.2vw,50px);line-height:1.08;max-width:820px;margin-bottom:14px;text-wrap:balance\">Three ways the road earns.<\u002Fh2>\n    <p style=\"font-size:clamp(16px,1.8vw,19px);line-height:1.6;max-width:700px;color:#95ABC0;margin-bottom:24px\">Built for the Indian market, where the EV sector is projected to reach <span style=\"color: rgb(220, 233, 242); font-weight: 600;\">₹8.4 lakh crore by 2030<\u002Fspan>. ChargePath layers recurring infrastructure, usage and subscription revenue on every kilometre deployed.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;margin-bottom:18px\">\n      <div style=\"background:rgba(255,255,255,.025);border:1px solid rgba(120,190,220,.12);border-radius:20px;padding:28px;display:flex;flex-direction:column\">\n        <span style=\"align-self:flex-start;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.15em;padding:5px 12px;border-radius:999px;background:rgba(62,139,240,.14);color:#8cb8f4;text-transform:uppercase;margin-bottom:18px\">Govt / NHAI<\u002Fspan>\n        <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:600;margin-bottom:8px\">Highway licensing<\u002Fh3>\n        <div style=\"font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700;color:#8cb8f4;margin-bottom:6px\">₹1.2 Cr<span style=\"font-size:15px;font-weight:500;color:#7d93a8\">/km/yr<\u002Fspan><\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.55;color:#92A8BD;margin-top:auto\">Recurring annual licence for every kilometre of ChargePath-fitted road. Funded through national EV and smart-roads infrastructure budgets.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:linear-gradient(180deg,rgba(25,201,168,.08),rgba(255,255,255,.02));border:1.5px solid rgba(25,201,168,.45);border-radius:20px;padding:28px;display:flex;flex-direction:column;box-shadow:0 14px 40px rgba(25,201,168,.12)\">\n        <span style=\"align-self:flex-start;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.15em;padding:5px 12px;border-radius:999px;background:rgba(25,201,168,.18);color:#7cf0d0;text-transform:uppercase;margin-bottom:18px\">Most scalable<\u002Fspan>\n        <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:600;margin-bottom:8px\">Per-use charging<\u002Fh3>\n        <div style=\"font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700;color:var(--cp-accent,#19C9A8);margin-bottom:6px\">₹15<span style=\"font-size:15px;font-weight:500;color:#7d93a8\">/kWh<\u002Fspan><\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.55;color:#A0B6CA;margin-top:auto\">Energy billed directly to the driver or fleet via the ChargePath app — on par with India's fast-charger rates, but with zero stops.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,.025);border:1px solid rgba(120,190,220,.12);border-radius:20px;padding:28px;display:flex;flex-direction:column\">\n        <span style=\"align-self:flex-start;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.15em;padding:5px 12px;border-radius:999px;background:rgba(124,108,247,.16);color:#b3a7f7;text-transform:uppercase;margin-bottom:18px\">Fleet / B2B<\u002Fspan>\n        <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:600;margin-bottom:8px\">Fleet subscription<\u002Fh3>\n        <div style=\"font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700;color:#b3a7f7;margin-bottom:6px\">₹5,000<span style=\"font-size:15px;font-weight:500;color:#7d93a8\">/veh/mo<\u002Fspan><\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.55;color:#92A8BD;margin-top:auto\">Unlimited highway charging for enrolled fleets, with a usage dashboard and analytics. Predictable costs for logistics operators.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px\">\n      <div style=\"background:rgba(8,26,46,.4);border:1px solid rgba(120,190,220,.1);border-radius:16px;padding:20px 22px\"><div style=\"font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:#DCE9F2;margin-bottom:4px\">~15 mo<\u002Fdiv><div style=\"font-size:13px;color:#7d93a8\">Payback period per km<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:rgba(8,26,46,.4);border:1px solid rgba(120,190,220,.1);border-radius:16px;padding:20px 22px\"><div style=\"font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:#DCE9F2;margin-bottom:4px\">₹2 Cr<\u002Fdiv><div style=\"font-size:13px;color:#7d93a8\">Annual revenue per km<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:rgba(8,26,46,.4);border:1px solid rgba(120,190,220,.1);border-radius:16px;padding:20px 22px\"><div style=\"font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:#DCE9F2;margin-bottom:4px\">~62%<\u002Fdiv><div style=\"font-size:13px;color:#7d93a8\">Gross margin at scale<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:rgba(8,26,46,.4);border:1px solid rgba(120,190,220,.1);border-radius:16px;padding:20px 22px\"><div style=\"font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:#DCE9F2;margin-bottom:4px\">+ OEM<\u002Fdiv><div style=\"font-size:13px;color:#7d93a8\">Receiver-pad licensing<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ AI ASSISTANT ============ -->\n  <section id=\"assistant\" style=\"position:relative;background:linear-gradient(180deg,transparent,rgba(8,32,58,.55),transparent);padding:clamp(72px,10vh,120px) 0\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:0 clamp(20px,5vw,56px);display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:44px;align-items:center\">\n      <div>\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:18px\">\n          <span style=\"font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.25em;color:var(--cp-accent,#19C9A8);text-transform:uppercase\">// Ask AI<\u002Fspan>\n        <\u002Fdiv>\n        <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(28px,4vw,46px);line-height:1.08;margin-bottom:18px;text-wrap:balance\">Questions about ChargePath? Just ask.<\u002Fh2>\n        <p style=\"font-size:clamp(15px,1.7vw,18px);line-height:1.65;color:#A0B6CA;margin-bottom:24px;text-wrap:pretty\">Our AI assistant knows the technology, pricing, pilot process and business model inside out. Ask anything - investors, partners and the curious all welcome.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <div style=\"display:flex;align-items:center;gap:10px;font-size:14px;color:#92A8BD\"><span style=\"color:var(--cp-accent,#19C9A8)\">▸<\u002Fspan> How the in-motion charging works<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10px;font-size:14px;color:#92A8BD\"><span style=\"color:var(--cp-accent,#19C9A8)\">▸<\u002Fspan> Pricing &amp; pilot costs in ₹<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10px;font-size:14px;color:#92A8BD\"><span style=\"color:var(--cp-accent,#19C9A8)\">▸<\u002Fspan> How to start a pilot or partnership<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- chat panel -->\n      <div style=\"display:flex;flex-direction:column;height:540px;background:rgba(6,20,36,.85);border:1px solid rgba(120,190,220,.16);border-radius:22px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4)\">\n        <div style=\"display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid rgba(120,190,220,.12);background:rgba(8,26,46,.7)\">\n          <div style=\"width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--cp-accent,#19C9A8),#3E8BF0);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0\">⚡<\u002Fdiv>\n          <div style=\"flex:1\">\n            <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px\">ChargePath AI<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:6px;font-size:12px;color:var(--cp-accent,#19C9A8)\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--cp-accent,#19C9A8);box-shadow:0 0 8px var(--cp-accent,#19C9A8)\"><\u002Fspan> Online — ask me anything<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div ref=\"{{ messagesRef }}\" style=\"flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px\">\n          <sc-for list=\"{{ messages }}\" as=\"m\" hint-placeholder-count=\"1\">\n            <sc-if value=\"{{ m.isBot }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"max-width:84%;align-self:flex-start;background:rgba(255,255,255,.05);color:#E0EBF4;padding:12px 15px;border-radius:14px;border-bottom-left-radius:4px;font-size:14px;line-height:1.55\">{{ m.text }}<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ m.isUser }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"max-width:84%;align-self:flex-end;background:linear-gradient(120deg,var(--cp-accent,#19C9A8),#3E8BF0);color:#04121f;font-weight:500;padding:12px 15px;border-radius:14px;border-bottom-right-radius:4px;font-size:14px;line-height:1.55\">{{ m.text }}<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ loading }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"align-self:flex-start;background:rgba(255,255,255,.05);padding:14px 16px;border-radius:14px;border-bottom-left-radius:4px;display:flex;gap:5px\">\n              <span class=\"cp-anim\" style=\"width:7px;height:7px;border-radius:50%;background:#7d93a8;animation:cpFloat .9s ease-in-out infinite\"><\u002Fspan>\n              <span class=\"cp-anim\" style=\"width:7px;height:7px;border-radius:50%;background:#7d93a8;animation:cpFloat .9s ease-in-out infinite .15s\"><\u002Fspan>\n              <span class=\"cp-anim\" style=\"width:7px;height:7px;border-radius:50%;background:#7d93a8;animation:cpFloat .9s ease-in-out infinite .3s\"><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <sc-if value=\"{{ showSug }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap;padding:10px 16px;border-top:1px solid rgba(120,190,220,.1)\">\n            <button onclick=\"{{ onSug }}\" data-q=\"How does ChargePath work?\" style=\"font-size:12px;padding:7px 13px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(120,190,220,.2);color:#A9BFD2;cursor:pointer;font-family:'Manrope',sans-serif\">How does it work?<\u002Fbutton>\n            <button onclick=\"{{ onSug }}\" data-q=\"What does it cost and how is it priced?\" style=\"font-size:12px;padding:7px 13px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(120,190,220,.2);color:#A9BFD2;cursor:pointer;font-family:'Manrope',sans-serif\">Pricing?<\u002Fbutton>\n            <button onclick=\"{{ onSug }}\" data-q=\"How do I start a pilot with ChargePath?\" style=\"font-size:12px;padding:7px 13px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(120,190,220,.2);color:#A9BFD2;cursor:pointer;font-family:'Manrope',sans-serif\">Start a pilot<\u002Fbutton>\n            <button onclick=\"{{ onSug }}\" data-q=\"Which EVs are compatible with ChargePath?\" style=\"font-size:12px;padding:7px 13px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(120,190,220,.2);color:#A9BFD2;cursor:pointer;font-family:'Manrope',sans-serif\">Compatible EVs<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display:flex;gap:10px;padding:12px 14px;border-top:1px solid rgba(120,190,220,.12)\">\n          <input ref=\"{{ inputRef }}\" onkeydown=\"{{ onKey }}\" placeholder=\"Ask about ChargePath…\" style=\"flex:1;font-size:14px;padding:11px 16px;border-radius:22px;border:1px solid rgba(120,190,220,.2);background:rgba(255,255,255,.03);color:#E8F1F8;font-family:'Manrope',sans-serif;outline:none\">\n          <button onclick=\"{{ onSend }}\" aria-label=\"Send\" style=\"width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--cp-accent,#19C9A8),#3E8BF0);border:none;cursor:pointer;color:#04121f;font-size:18px;font-weight:700;flex-shrink:0;display:flex;align-items:center;justify-content:center\">↑<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ VISION ============ -->\n  <section id=\"vision\" style=\"position:relative;padding:clamp(96px,14vh,160px) clamp(20px,5vw,56px);text-align:center;overflow:hidden\">\n    <div class=\"cp-anim\" style=\"position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(700px,90vw);height:min(700px,90vw);border-radius:50%;background:radial-gradient(circle,rgba(25,201,168,.12),transparent 65%);animation:cpPulse 6s ease-in-out infinite;pointer-events:none\"><\u002Fdiv>\n    <div style=\"position:relative;max-width:980px;margin:0 auto\">\n      <span style=\"font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.3em;color:var(--cp-accent,#19C9A8);text-transform:uppercase\">// Our vision<\u002Fspan>\n      <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(26px,4.6vw,56px);line-height:1.18;margin-top:24px;text-wrap:balance\">A future where every road powers the vehicles that travel it and  from the electric age.<\u002Fh2>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ CONTACT / PARTNERSHIP ============ -->\n  <section id=\"contact\" style=\"position:relative;max-width:1100px;margin:0 auto;padding:clamp(40px,6vh,80px) clamp(20px,5vw,56px) clamp(72px,10vh,110px)\">\n    <div style=\"background:linear-gradient(135deg,rgba(25,201,168,.1),rgba(62,139,240,.08));border:1px solid rgba(120,190,220,.18);border-radius:26px;padding:clamp(32px,5vw,64px);text-align:center\">\n      <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(26px,4vw,46px);line-height:1.1;margin-bottom:16px;text-wrap:balance\">Let's electrify the road ahead.<\u002Fh2>\n      <p style=\"font-size:clamp(15px,1.7vw,18px);line-height:1.6;max-width:600px;margin:0 auto 18px;color:#A0B6CA\">We're partnering with the organisations who build, run and electrify the roads of tomorrow.<\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:32px\">\n        <span style=\"font-family:'Space Mono',monospace;font-size:12px;padding:7px 15px;border-radius:999px;border:1px solid rgba(120,190,220,.2);color:#A9BFD2\">Government agencies<\u002Fspan>\n        <span style=\"font-family:'Space Mono',monospace;font-size:12px;padding:7px 15px;border-radius:999px;border:1px solid rgba(120,190,220,.2);color:#A9BFD2\">EV manufacturers<\u002Fspan>\n        <span style=\"font-family:'Space Mono',monospace;font-size:12px;padding:7px 15px;border-radius:999px;border:1px solid rgba(120,190,220,.2);color:#A9BFD2\">Logistics &amp; fleets<\u002Fspan>\n        <span style=\"font-family:'Space Mono',monospace;font-size:12px;padding:7px 15px;border-radius:999px;border:1px solid rgba(120,190,220,.2);color:#A9BFD2\">Public transport<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:14px;justify-content:center\">\n        <button data-tally-open=\"A7QNal\" data-tally-emoji-text=\"👋\" data-tally-emoji-animation=\"wave\" style=\"display:inline-flex;align-items:center;gap:9px;padding:15px 32px;border-radius:999px;background:linear-gradient(100deg,var(--cp-accent,#19C9A8),#3E8BF0);color:#04121f;font-weight:700;font-size:15px;font-family:'Manrope',sans-serif;cursor:pointer;box-shadow:0 10px 34px rgba(25,201,168,.3)\">Share your feedback 👋<\u002Fbutton>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection><footer style=\"border-top: 1px solid rgba(120,190,220,.1); padding: 36px clamp(20px,5vw,56px); display: flex; flex-wrap: wrap; gap: 20px; align-items: center; justify-content: space-between; max-width: 1280px; margin: 0 auto; position: relative\">\n    <div style=\"display:flex;align-items:center;gap:11px\">\n      <img src=\"216ba71f-e907-499b-95ae-6e899857ba83\" alt=\"ChargePath\" style=\"width: 99px; height: 82px; object-fit: contain\">\n      <div>\n        \n        \n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:24px;font-size:13px;color:#7d93a8\">\n      <a href=\"#problem\">Problem<\u002Fa><a href=\"#tech\">Technology<\u002Fa><a href=\"#business\">Business<\u002Fa><a href=\"#assistant\">Ask AI<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"font-size:12px;color:#5E768B;font-family:'Space Mono',monospace\">© 2026 ChargePath<\u002Fdiv>\n  <div style=\"font-family: 'Space Grotesk',sans-serif; font-weight: 600; font-size: 15px; letter-spacing: .2em; position: absolute; left: 128px; top: 69px\">CHARGEPATH<\u002Fdiv><\u002Ffooter>\n\n  <!-- ============ FOOTER ============ -->\n  \n\n<\u002Fdiv>\n<\u002Fx-dc>\n\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#19C9A8&quot;,&quot;options&quot;:[&quot;#19C9A8&quot;,&quot;#3E8BF0&quot;,&quot;#5DCA8A&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;reduceMotion&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.rootRef = React.createRef();\n    this.navRef = React.createRef();\n    this.messagesRef = React.createRef();\n    this.inputRef = React.createRef();\n    this.state = {\n      messages: [{ role:'bot', text:\"Hi! I'm ChargePath AI. Ask me anything about our wireless in-motion EV charging — the technology, pricing in ₹, pilots or partnerships. What would you like to know?\" }],\n      loading: false,\n      showSug: true\n    };\n    this.history = [];\n  }\n\n  componentDidMount(){\n    this.applyAccent();\n    this._onScroll = () => {\n      const n = this.navRef.current; if(!n) return;\n      if(window.scrollY > 40){\n        n.style.background = 'rgba(5,18,30,.82)';\n        n.style.backdropFilter = 'blur(14px)';\n        n.style.borderBottomColor = 'rgba(120,190,220,.12)';\n      } else {\n        n.style.background = 'transparent';\n        n.style.backdropFilter = 'none';\n        n.style.borderBottomColor = 'transparent';\n      }\n    };\n    window.addEventListener('scroll', this._onScroll, { passive:true });\n    this._onScroll();\n    // reveal nav links on wider screens\n    this._mq = window.matchMedia('(min-width: 1060px)');\n    this._applyMq = () => {\n      const el = this.rootRef.current && this.rootRef.current.querySelector('[data-navlinks]');\n      if(el) el.style.display = this._mq.matches ? 'flex' : 'none';\n    };\n    this._applyMq();\n    this._mq.addEventListener('change', this._applyMq);\n  }\n  componentDidUpdate(){\n    this.applyAccent();\n    const m = this.messagesRef.current;\n    if(m) m.scrollTop = m.scrollHeight;\n  }\n  componentWillUnmount(){\n    window.removeEventListener('scroll', this._onScroll);\n    if(this._mq) this._mq.removeEventListener('change', this._applyMq);\n  }\n\n  applyAccent(){\n    const el = this.rootRef.current;\n    if(el) el.style.setProperty('--cp-accent', this.props.accentColor || '#19C9A8');\n  }\n\n  navHover(e){ e.currentTarget.style.color = '#EAF4F8'; }\n  navOut(e){ e.currentTarget.style.color = '#A9BFD2'; }\n\n  onKey(e){ if(e.key === 'Enter'){ e.preventDefault(); this.submit(this.inputRef.current.value); } }\n  onSend(){ this.submit(this.inputRef.current.value); }\n  onSug(e){ this.submit(e.currentTarget.getAttribute('data-q')); }\n\n  // Built-in ChargePath knowledge engine — works fully offline, no API key, no backend.\n  localAnswer(raw){\n    const t = (raw||'').toLowerCase();\n    const has = (...ks) => ks.some(k => t.includes(k));\n    const score = (...ks) => ks.reduce((n,k)=> n + (t.includes(k)?1:0), 0);\n    const intents = [\n      { id:'greet', s: score('hello','hi ','hey','namaste','good morning','good evening') + (/^(hi|hey|yo)\\b/.test(t)?2:0),\n        a:\"Hi there! 👋 I'm ChargePath AI. I can explain how our in-motion wireless charging works, pricing in ₹, how to start a pilot, or which EVs are compatible. What would you like to know?\" },\n      { id:'thanks', s: score('thank','thanks','thx','appreciate'),\n        a:\"Happy to help! ⚡ Anything else you'd like to know about ChargePath — the technology, pricing, or starting a pilot?\" },\n      { id:'how', s: score('how does','how do','how it works','work','technology','tech','coil','inductive','transfer','magnet','science','principle'),\n        a:\"ChargePath embeds wireless charging coils in a smart layer beneath the road. As an EV drives over them, energy transfers wirelessly via resonant inductive coupling to a receiver pad under the vehicle — so the battery tops up in motion, with no stops. Want to know about the receiver pad or which EVs are compatible?\" },\n      { id:'price', s: score('price','pricing','cost','how much','kwh','tariff','rate','fee','charge me','expensive','₹','rupee'),\n        a:\"Pricing has three layers: ₹15/kWh per-use charging billed via the app, ₹1.2 Cr/km/yr government highway licensing, and ₹5,000/vehicle/month for fleet subscriptions — plus OEM receiver-pad licensing. A pilot install runs about ₹2.5 Cr per km. Would you like the fleet plan or the per-use details?\" },\n      { id:'pilot', s: score('pilot','start','partner','partnership','deploy','trial','get started','contact','reach','demo','collaborat','tender'),\n        a:\"Great — pilots start through a government tender, a direct partnership inquiry, or the feedback form on this page. Tell me whether you're a government agency, a fleet operator, or an EV manufacturer and I'll point you the right way. Shall I outline what a first pilot looks like?\" },\n      { id:'compat', s: score('compatible','compatibility','my car','which ev','which vehicle','retrofit','receiver','pad','support my','works with','tesla','tata','mahindra'),\n        a:\"Most EVs can use ChargePath — they just need a retrofittable receiver pad mounted underneath, and OEMs can build it in directly. The pad picks up the wireless energy from the road coils as you drive. Want to know about retrofitting an existing vehicle or fleet?\" },\n      { id:'biz', s: score('business','revenue','model','market','india','profit','margin','payback','earn','money make','roi','invest'),\n        a:\"ChargePath layers recurring revenue on every kilometre: government licensing, per-use charging, and fleet subscriptions, with ~₹2 Cr annual revenue per km, ~62% gross margin at scale and a ~15-month payback. It targets India's EV market, projected to reach ₹8.4 lakh crore by 2030. Curious about the unit economics or the customer segments?\" },\n      { id:'benefit', s: score('benefit','why','advantage','range anxiety','downtime','better','point','help','good','problem'),\n        a:\"The big win is no charging stops — range anxiety disappears because the road charges you as you drive. Fleets cut downtime and run nearly 24/7, EVs can ship with smaller, lighter batteries, and EV adoption accelerates. Want the fleet angle or the consumer angle?\" },\n      { id:'safety', s: score('safe','safety','radiation','health','danger','rain','weather','flood','wet','snow','durable','last'),\n        a:\"The coils sit sealed beneath the asphalt, so the surface stays a normal, all-weather road — rain, heat and traffic loads are handled by the road structure itself. Resonant inductive transfer is tightly coupled and shielded, keeping energy focused between road and vehicle. Anything specific about durability or weather you'd like to dig into?\" },\n      { id:'install', s: score('install','build','construct','existing road','retrofit road','dig','lay','infrastructure'),\n        a:\"ChargePath panels go into a dedicated charging lane — the coil layer is installed beneath the asphalt and connected to the power grid, so existing highways can be upgraded corridor by corridor. A pilot install is about ₹2.5 Cr per km. Want to know how a corridor rollout is phased?\" }\n    ];\n    intents.sort((a,b)=> b.s - a.s);\n    if(intents[0].s > 0) return intents[0].a;\n    return \"I can help with how ChargePath's in-motion charging works, pricing in ₹, starting a pilot, compatible EVs, or the business model. Could you tell me a bit more about what you'd like to know? You can also tap one of the suggestion chips below.\";\n  }\n\n  async submit(raw){\n    const text = (raw||'').trim();\n    if(!text || this.state.loading) return;\n    if(this.inputRef.current) this.inputRef.current.value = '';\n    const msgs = this.state.messages.concat([{ role:'user', text }]);\n    this.setState({ messages: msgs, loading: true, showSug: false });\n    this.history.push({ role:'user', content: text });\n\n    const SYSTEM = \"You are ChargePath AI, a friendly, concise assistant for ChargePath — a startup that embeds wireless charging coils into highway road surfaces so electric vehicles charge while driving (in-motion wireless charging). Tagline: 'Power while you drive'. Mission: erase range anxiety by turning highways into continuous charging networks. Technology: resonant inductive wireless power transfer in a smart road layer; EVs need a retrofittable receiver pad underneath. Target customers: government agencies (NHAI, Smart City Mission), logistics/fleet companies, EV manufacturers, public transport operators. Pricing: ₹15/kWh per-use charging fee; ₹1.2 Cr/km/yr government highway licensing; ₹5,000/vehicle/month fleet subscription; plus OEM receiver-pad licensing. Pilot install cost ~₹2.5 Cr per km. India EV market projected ₹8.4 lakh crore by 2030. Benefits: no charging stops, less fleet downtime, lighter EV battery designs, 24/7 operation. To start a pilot: government tender, partnership inquiry, or the feedback form on this site. Keep replies to 2-4 sentences, helpful and enthusiastic, use ₹ for money, and end with a brief follow-up question or offer to help.\";\n\n    const finish = (clean) => {\n      this.history.push({ role:'assistant', content: clean });\n      this.setState({ messages: this.state.messages.concat([{ role:'bot', text: clean }]), loading:false });\n    };\n\n    // 1) Live Claude when this workspace helper is available.\n    if(typeof window !== 'undefined' && window.claude && typeof window.claude.complete === 'function'){\n      try {\n        const convo = this.history.slice(-8).map(m => (m.role==='user'?'User: ':'Assistant: ') + m.content).join('\\n');\n        const prompt = SYSTEM + \"\\n\\nConversation so far:\\n\" + convo + \"\\nAssistant:\";\n        const reply = await window.claude.complete(prompt);\n        const clean = (reply||'').trim();\n        if(clean){ finish(clean); return; }\n      } catch(err){ /* fall through to local engine */ }\n    }\n\n    // 2) Optional: live Anthropic API if a key is configured on the host page\n    //    (set window.CHARGEPATH_AI_KEY = \"sk-ant-...\" before this script to enable).\n    const key = (typeof window !== 'undefined') && window.CHARGEPATH_AI_KEY;\n    if(key){\n      try {\n        const res = await fetch('https://api.anthropic.com/v1/messages', {\n          method:'POST',\n          headers:{ 'content-type':'application/json', 'x-api-key':key, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },\n          body: JSON.stringify({\n            model:'claude-3-5-haiku-latest', max_tokens:300, system:SYSTEM,\n            messages: this.history.slice(-8).map(m => ({ role:m.role==='user'?'user':'assistant', content:m.content }))\n          })\n        });\n        const data = await res.json();\n        const clean = (data && data.content && data.content[0] && data.content[0].text || '').trim();\n        if(clean){ finish(clean); return; }\n      } catch(err){ /* fall through to local engine */ }\n    }\n\n    // 3) Built-in offline knowledge engine — always works, anywhere.\n    await new Promise(r => setTimeout(r, 420 + Math.random()*360));\n    finish(this.localAnswer(text));\n  }\n\n  renderVals(){\n    return {\n      rootRef: this.rootRef,\n      navRef: this.navRef,\n      messagesRef: this.messagesRef,\n      inputRef: this.inputRef,\n      motionAttr: (this.props.reduceMotion ? 'off' : 'on'),\n      messages: this.state.messages.map(m => ({ text:m.text, isBot:m.role==='bot', isUser:m.role==='user' })),\n      loading: this.state.loading,\n      showSug: this.state.showSug,\n      navHover: this.navHover.bind(this),\n      navOut: this.navOut.bind(this),\n      onKey: this.onKey.bind(this),\n      onSend: this.onSend.bind(this),\n      onSug: this.onSug.bind(this)\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
